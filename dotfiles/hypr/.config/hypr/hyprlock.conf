# Colors
source = ~/.config/hypr/config/colors.conf

# Background
background {
    monitor =
    path = $image
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.1
}

# General
general {
    disable_loading_bar = false
    ignore_empty_input = true
    immediate_render = false
    text_trim = true
    fail_timeout = 2000
}

animations {
  enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = fade, 1, 3.0, quick
    animation = fadeIn, 1, 5.0, easeInOutCubic
    animation = fadeOut, 1, 6.0, easeOutQuint
    animation = inputFieldColors, 1, 1.5, quick
    animation = inputFieldFade, 1, 0.5, quick
    animation = inputFieldWidth, 1, 0.5, almostLinear
    animation = inputFieldDots, 1, 1.5, linear
}



# Day-Month-Date
label {
    monitor =
    text = cmd[update:60000] echo -e "$(date +"%A, %B %d")"
    color = $secondary
    font_size = 25
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 0%, 32.5%
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.2
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $primary
    font_size = 120
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 0%, 23%
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = $outline
    shadow_boost = 1.5
}

# Profie-Photo
image {
    monitor =
    path = $HOME/Pictures/MyImages/ERS.jpg
    border_size = 2
    border_color = $primary_container
    size = 12%
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0%, 3.7%
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.2
}

# User-Box
shape {
    monitor =
    size = 15.6%, 5.6%
    color = rgba(255, 255, 255, .1)
    rounding = -1
    border_size = 0
    border_color = $outline
    rotate = 0
    xray =  # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0%, -12%
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.2

}

# User
label {
    monitor =
    text =  Welcome!
    color = $tertiary
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 18
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 0%, -12%
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.2

}

# INPUT FIELD
input-field {
    monitor =
    size = 15.6%, 5.6%
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $primary_fixed_dim
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $tertiary_fixed_dim
    fade_on_empty = false
    font_family = CaskaydiaCove Nerd Font Propo Bold
    placeholder_text = <span foreground="##ffffff99">󰌾  Enter Pass</span>
    hide_input = false
    position = 0%, -19.5%
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.0

}

# Script Path
$music_cmd = ~/scripts/song_detail.sh
$artfile = /tmp/mpris-cover.png
$battery = ~/.config/hypr/scripts/battery.sh
$weather = ~/.config/hypr/scripts/weather.sh

# Music box
shape {
    monitor =
    size = 17.7%, 13%
    color = $primary_container_transparent
    rounding = 30
    rotate = 0
    position = -1.6%, -4.6%
    halign = right
    valign = top
    zindex = 1
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.0
}

# Music Album Cover
image {
    monitor =
    path = $artfile
    size = 10.2%
    rounding = 20
    rotate = 0
    reload_time = 0
    reload_cmd =
    position = -2.1%, -5.6%
    halign = right
    valign = top
    zindex = 2
    reload_time = 1
    reload_cmd =  $music_cmd --cover-path
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.0
}

# Player source
label {
    monitor =
    text = cmd[update:5000] echo "$($music_cmd --player-icon) $($music_cmd --player)"
    color = $on_primary_container
    font_size = 10
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 81.8%, -6%
    halign = left
    valign = top
    zindex = 5
}

# Player title
label {
    monitor =
    text = cmd[update:1000] echo "$($music_cmd --short-title)"
    color = $on_primary_container
    font_size = 12
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 81.8%, -8.8%
    halign = left
    valign = top
    zindex = 5
}

# Player artist
label {
    monitor =
    text = cmd[update:1000] echo "$($music_cmd --short-artist)"
    color = $on_primary_container
    font_size = 10
    font_family = CaskaydiaCove Nerd Font Propo Bold
    halign = left
    valign = top
    position = 81.8%, -10.7%
    zindex = 5
}

# Player status
label {
    monitor =
    text = cmd[update:1000] echo "$($music_cmd --status-icon)"
    color = $on_primary_container
    font_size = 20
    font_family = CaskaydiaCove Nerd Font Propo Bold
    halign = right
    valign = top
    position = -14.1%, -13.7%
    zindex = 5
    onclick = playerctl -p "$($music_cmd --player-real-name)" play-pause
}

# Player next
label {
    monitor =
    text = 󰙡
    color = $on_primary_container
    font_size = 20
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = -11.5%, -13.7%
    halign = right
    valign = top
    zindex = 5
    onclick = playerctl -p "$($music_cmd --player-real-name)" next
}

# Player previous
label {
    monitor =
    text = 󰙣
    color = $on_primary_container
    font_size = 20
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = -16.7%, -13.7%
    halign = right
    valign = top
    zindex = 5
    onclick = playerctl -p "$($music_cmd --player-real-name)" previous
}

# Battery box
shape {
    monitor =
    size = 17.7%, 7.4%
    color = $secondary_container_transparent
    rounding = 20
    rotate = 0
    position = -1.6%, -20.4%
    halign = right
    valign = top
    zindex = 1
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.0
}


# Battery status
label {
    monitor =
    text = cmd[update:5000] echo -e "$($battery --status)"
    color = $on_secondary_container
    font_size = 25
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = -3.1%, -22.2%
    halign = right
    valign = top
    zindex = 5
}

# Battery profile
label {
    monitor =
    text = cmd[update:5000] echo -e "$($battery --profile) "
    color = $on_secondary_container
    font_size = 12
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 81.3%, -21.8%
    halign = left
    valign = top
    zindex = 5
}

# Battery time
label {
    monitor =
    text = cmd[update:5000] echo -e "$($battery --time)"
    color = $on_secondary_container
    font_size = 12
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 81.3%, -24.5%
    halign = left
    valign = top
    zindex = 5
}

# Weather Box
shape {
    monitor =
    size = 17.7%, 4.6%
    color = $tertiary_container_transparent
    rounding = 20
    rotate = 0
    position = -1.6%, -30.6%
    halign = right
    valign = top
    zindex = 1
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $outline
    shadow_boost = 1.0

}

# Weather
label {
    monitor =
    text = cmd[update:600000] echo "$($weather --simple)"
    color = $on_tertiary_container
    font_size = 10
    font_family = CaskaydiaCove Nerd Font Propo Bold
    position = 81.3%, -32.1%
    halign = left
    valign = top
    zindex = 5
}
