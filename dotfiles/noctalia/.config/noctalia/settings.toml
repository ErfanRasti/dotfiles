config_version = 1

[audio]
enable_overdrive = true
enable_sounds = true
notification_sound = "~/.nix-profile/share/sounds/freedesktop/stereo/message.oga"
sound_volume = 1.0
volume_change_sound = "~/.nix-profile/share/sounds/ocean/stereo/audio-volume-change.oga"

[backdrop]

enabled = true
[bar.default]
background_opacity = 0.5
capsule = true
capsule_opacity = 0.6
capsule_padding = 4.0
capsule_thickness = 0.85
center = [
  "notifications",
  "media",
  "group:g6",
  "audio_visualizer",
  "power_profile",
]
color = "primary"
contact_shadow = true
end = [
  "tray",
  "lock_keys",
  "keyboard_layout",
  "group:g2",
  "group:g4",
  "group:g1",
  "group:g5",
  "control-center",
]
font_weight = 700
icon_color = "tertiary"
margin_ends = 0
padding = 2
panel_overlap = 0
scale = 0.9
start = ["session", "workspaces", "active_window"]
thickness = 24
widget_spacing = 2

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g1"
members = ["network", "bluetooth"]
opacity = 0.6
padding = 4.0

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g2"
members = ["cpu", "spacer_4", "temp", "spacer_5", "ram"]
opacity = 0.6
padding = 4.0

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g4"
members = ["privacy", "output_volume", "input_volume"]
opacity = 0.6
padding = 4.0

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g5"
members = ["battery", "caffeine"]
opacity = 0.6
padding = 4.0

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g6"
members = ["clock", "spacer_2", "weather"]
opacity = 0.6
padding = 5.0

[[bar.default.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g7"
members = ["media"]
opacity = 0.6
padding = 4.0

[brightness]
sync_all_monitors = true

[calendar]
enabled = true

[calendar.account.personal_google]
type = "google"

[desktop_widgets]
schema_version = 2
widget_order = [
  "desktop-widget-0000000000000001",
  "desktop-widget-0000000000000002",
  "desktop-widget-0000000000000003",
  "desktop-widget-0000000000000004",
  # "desktop-widget-0000000000000005",
  # "desktop-widget-0000000000000006",
  # "desktop-widget-0000000000000007",
  # "desktop-widget-0000000000000008",
]

[desktop_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[desktop_widgets.widget.desktop-widget-0000000000000001]
box_height = 100.0
box_width = 200.0
cx = 160.0
cy = 160.0
output = "eDP-1"
rotation = 0.0
type = "clock"

[desktop_widgets.widget.desktop-widget-0000000000000002]
box_height = 40.0
box_width = 200.0
cx = 160.0
cy = 235.0
output = "eDP-1"
rotation = 0.0
type = "clock"

[desktop_widgets.widget.desktop-widget-0000000000000002.settings]
format = "{:%a, %b %d}"


[desktop_widgets.widget.desktop-widget-0000000000000003]
box_height = 100.0
box_width = 200.0
cx = 370.0
cy = 160.0
output = "eDP-1"
rotation = 0.0
type = "weather"

[desktop_widgets.widget.desktop-widget-0000000000000004]
box_height = 150.0
box_width = 300.0
cx = 200.0
cy = 1120.0
output = "eDP-1"
rotation = 0.0
type = "media_player"

[desktop_widgets.widget.desktop-widget-0000000000000004.settings]
hide_when_no_media = true

[desktop_widgets.widget.desktop-widget-0000000000000005]
box_height = 120.0
box_width = 200.0
cx = 1900.0
cy = 900.0
output = "eDP-1"
rotation = 0.0
type = "sysmon"

[desktop_widgets.widget.desktop-widget-0000000000000005.settings]
display = "graph"
stat = "cpu_usage"
stat2 = "cpu_temp"


[desktop_widgets.widget.desktop-widget-0000000000000006]
box_height = 120.0
box_width = 200.0
cx = 1900.0
cy = 1025.0
output = "eDP-1"
rotation = 0.0
type = "sysmon"

[desktop_widgets.widget.desktop-widget-0000000000000006.settings]
stat = "ram_pct"
stat2 = "swap_pct"

[desktop_widgets.widget.desktop-widget-0000000000000007]
box_height = 120.0
box_width = 200.0
cx = 1900.0
cy = 1150.0
output = "eDP-1"
rotation = 0.0
type = "sysmon"

[desktop_widgets.widget.desktop-widget-0000000000000007.settings]
stat = "net_rx"
stat2 = "net_tx"

[desktop_widgets.widget.desktop-widget-0000000000000008]
box_height = 300.0
box_width = 300.0
cx = 1850.0
cy = 200.0
output = "eDP-1"
rotation = 0.0
type = "fancy_audio_visualizer"

[desktop_widgets.widget.desktop-widget-0000000000000008.settings]
background = true
visualization_mode = "wave_rings"

[dock]
auto_hide = true
background_opacity = 0.6
cross_axis_padding = 2
enabled = true
icon_size = 36
item_spacing = 0
launcher_icon = "apps"
launcher_position = "end"
main_axis_padding = 0
pinned = [
  "yazi",
  "zen",
  "google-chrome",
  "firefox",
  "matlab",
  "code",
  "kitty",
  "spotify",
  "telegram",
  "microsoft-edge",
  "wordbook",
]
reserve_space = false
show_dots = true

[keybinds]
cancel = ["Escape", "Ctrl+q"]
down = ["Down", "Ctrl+j"]
left = ["Left", "Ctrl+h"]
right = ["Right", "Ctrl+l"]
up = ["Up", "Ctrl+k"]

[location]
auto_locate = true


[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
  "lockscreen-login-box@eDP-1",
  "lockscreen-widget-0000000000000001",
  "lockscreen-widget-0000000000000002",
  "lockscreen-widget-0000000000000003",
]

[lockscreen_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
box_height = 70.0
box_width = 400.0
cx = 1024.0
cy = 1161.0
output = "eDP-1"
rotation = 0.0
type = "login_box"

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
background_color = "surface_variant"
background_opacity = 0.88
background_radius = 12.0
input_opacity = 1.0
input_radius = 6.0
show_caps_lock = true
show_keyboard_layout = true
show_login_button = true
show_password_hint = true

[lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
box_height = 100.0
box_width = 200.0
cx = 920.0
cy = 160.0
output = "eDP-1"
rotation = 0.0
type = "clock"

[lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
box_height = 100.0
box_width = 200.0
cx = 1136.0
cy = 160.0
output = "eDP-1"
rotation = 0.0
type = "weather"

[lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
box_height = 150.0
box_width = 300.0
cx = 200.0
cy = 1120.0
output = "eDP-1"
rotation = 0.0
type = "media_player"

[lockscreen_widgets.widget.lockscreen-widget-0000000000000003.settings]
hide_when_no_media = true

[nightlight]
enabled = true

[notification]
background_opacity = 0.7
position = "bottom_right"

[osd]
background_opacity = 0.6

[plugins]
enabled = []

[shell]
font_family = "CaskaydiaCove NF"
niri_overview_type_to_launch_enabled = true
password_style = "random"
polkit_agent = true
screen_time_enabled = true

[shell.launcher]
session_search = true

[shell.panel]
clipboard_placement = "attached"
launcher_placement = "attached"
open_near_click_control_center = true
open_near_click_launcher = true
polkit_placement = "attached"
polkit_position = "auto"
transparency_mode = "glass"

[shell.screenshot]
confirm_region = true
directory = "~/Pictures/Screenshots"

[[shell.session.actions]]
action = "lock"
countdown_seconds = 0.0
enabled = true
shortcut = "1"
variant = "default"

[[shell.session.actions]]
action = "lock_and_suspend"
countdown_seconds = 0.0
enabled = true
shortcut = "3"
variant = "default"

[[shell.session.actions]]
action = "logout"
countdown_seconds = 0.0
enabled = true
shortcut = "2"
variant = "default"

[[shell.session.actions]]
action = "command"
command = "systemctl --user hibernate"
countdown_seconds = 0.0
enabled = true
glyph = "hibernate"
label = "Hibernate"
variant = "default"

[[shell.session.actions]]
action = "reboot"
countdown_seconds = 0.0
enabled = true
shortcut = "4"
variant = "default"

[[shell.session.actions]]
action = "shutdown"
countdown_seconds = 0.0
enabled = true
shortcut = "5"
variant = "destructive"

[shell.shadow]
alpha = 0.8

[theme]
builtin = "Noctalia"
community_palette = "Osaka jade"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"

[wallpaper]
directory = "~/Pictures/Wallpapers/Unsplash"
directory_dark = "~/Pictures/Wallpapers/Unsplash"
directory_light = "~/Pictures/Wallpapers/Unsplash/"
fill_color = "primary"
transition_on_startup = true

[widget.active_window]
max_length = 120
min_length = 0
title_scroll = "on_hover"

[widget.battery]
display_mode = "graphic"

[widget.clock]
format = "%H:%M:%S | %a, %b %d"

[widget.input_volume]
show_label = true

[widget.keyboard_layout.custom_labels]
"Persian (Windows)" = "PER"

[widget.lock_keys]
hide_when_off = true

[widget.media]
hide_when_no_media = true
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.output_volume]
show_label = true

[widget.privacy]
active_color = "secondary"
hide_inactive = true

[widget.spacer_2]
length = 10
type = "spacer"

[widget.spacer_4]
length = 5
type = "spacer"

[widget.spacer_5]
length = 5
type = "spacer"

[widget.tray]
drawer = true
match_adjacent_spacing = true

[widget.workspaces]
capsule = true
display = "name"
minimal = false

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "dark_mode"
