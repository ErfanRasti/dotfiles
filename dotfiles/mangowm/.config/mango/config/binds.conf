# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=super,r,reload_config

# launcher and terminal
bind=super,d,spawn,~/.config/hypr/scripts/toggle_rofi_launcher.sh
bind=super,return,spawn,kitty
bind=super,i,spawn,env XDG_CURRENT_DESKTOP=GNOME gnome-control-center
bind=super,e,spawn,env XDG_CURRENT_DESKTOP=GNOME nautilus
bind=super+alt,e,spawn,kitty --override confirm_os_window_close=0 --class yazi bash -c yazi
bind=ctrl+shift,escape,spawn,kitty --override confirm_os_window_close=0 --class btop -e btop
bind=super,grave,spawn,kitty --class kitty-dropterm --title kitty-dropterm

# exit and close
bind=super+shift,q,quit
bind=super,q,killclient,

# switch window focus
bind=super,left,focusdir,left
bind=super,right,focusdir,right
bind=super,up,focusdir,up
bind=super,down,focusdir,down
bind=super,h,focusdir,left
bind=super,j,focusdir,down
bind=super,k,focusdir,up
bind=super,l,focusdir,right

# cycle focus
bind=super,tab,focusstack,next

# swap window
bind=super+ctrl,up,exchange_client,up
bind=super+ctrl,down,exchange_client,down
bind=super+ctrl,left,exchange_client,left
bind=super+ctrl,right,exchange_client,right
bind=super+ctrl,k,exchange_client,up
bind=super+ctrl,j,exchange_client,down
bind=super+ctrl,h,exchange_client,left
bind=super+ctrl,l,exchange_client,right

# focus first/last column
bind=super,home,focusdir,left
bind=super,end,focusdir,right

# switch window status
bind=super,g,toggleglobal
bind=super,o,toggleoverview
bind=super,f,togglefloating
bind=super,M,togglemaximizescreen
bind=super+shift,f,togglefullscreen
bind=super+ctrl+shift,f,togglefakefullscreen

# scroller layout
bind=alt,e,set_proportion,1.0
bind=alt,x,switch_proportion_preset
bind=alt+super+ctrl,left,scroller_stack,left
bind=alt+super+ctrl,right,scroller_stack,right
bind=alt+super+ctrl,up,scroller_stack,up
bind=alt+super+ctrl,down,scroller_stack,down

# dwindle layout (manual split mode)
bind=alt+shift,return,dwindle_toggle_split_direction

# switch layout
bind=super,n,switch_layout

# switch to specific layouts
bind=super,f1,setlayout,center_tile
bind=super,f2,setlayout,scroller
bind=super,f3,setlayout,grid
bind=super,f4,setlayout,deck
bind=super,f5,setlayout,monocle

# toggle trackpad
bind=super,f6,toggle_trackpad_enable

# workspace switch
bind=super,1,view,1,0
bind=super,2,view,2,0
bind=super,3,view,3,0
bind=super,4,view,4,0
bind=super,5,view,5,0
bind=super,6,view,6,0
bind=super,7,view,7,0
bind=super,8,view,8,0
bind=super,9,view,9,0

# move client to workspace
bind=super+shift,1,tag,1,0
bind=super+shift,2,tag,2,0
bind=super+shift,3,tag,3,0
bind=super+shift,4,tag,4,0
bind=super+shift,5,tag,5,0
bind=super+shift,6,tag,6,0
bind=super+shift,7,tag,7,0
bind=super+shift,8,tag,8,0
bind=super+shift,9,tag,9,0

# previous workspace
bind=super,p,view,previous,0

# monitor focus
bind=super+shift,left,focusmon,left
bind=super+shift,right,focusmon,right
bind=super+shift,up,focusmon,up
bind=super+shift,down,focusmon,down
bind=super+shift,h,focusmon,left
bind=super+shift,j,focusmon,down
bind=super+shift,k,focusmon,up
bind=super+shift,l,focusmon,right

# move client to monitor
bind=super+ctrl+shift,left,tagmon,left
bind=super+ctrl+shift,right,tagmon,right
bind=super+ctrl+shift,up,tagmon,up
bind=super+ctrl+shift,down,tagmon,down

# gaps
bind=alt+shift,x,incgaps,1
bind=alt+shift,z,incgaps,-1
bind=alt+shift,r,togglegaps

# movewin
bind=ctrl+shift,up,movewin,+0,-50
bind=ctrl+shift,down,movewin,+0,+50
bind=ctrl+shift,left,movewin,-50,+0
bind=ctrl+shift,right,movewin,+50,+0

# resizewin
bind=ctrl+alt,up,resizewin,+0,-50
bind=ctrl+alt,down,resizewin,+0,+50
bind=ctrl+alt,left,resizewin,-50,+0
bind=ctrl+alt,right,resizewin,+50,+0

# scratchpad
bind=super,w,minimized
bind=super+shift,w,toggle_scratchpad

# rofi applets
bind=super+alt,a,spawn,~/.config/rofi/applets/scripts/apps.sh
bind=super+alt,q,spawn,~/.config/rofi/applets/scripts/quicklinks.sh
bind=super+alt,b,spawn,~/.config/rofi/applets/scripts/battery.sh
bind=super+ctrl,v,spawn,~/.config/rofi/applets/scripts/volume.sh
bind=super+ctrl,b,spawn,~/.config/rofi/applets/scripts/brightness.sh
bind=super+ctrl,p,spawn,~/.config/rofi/applets/scripts/player.sh
bind=super+shift,escape,spawn,~/.config/rofi/powermenu/run.sh
bind=super+alt,p,spawn,~/.config/rofi/applets/scripts/powermenu.sh
bind=super+period,spawn,~/.config/rofi/emoji/run.sh

# screenshot
bind=none,print,spawn,grimblast copysave output
bind=shift,print,spawn,grimblast copysave screen
bind=super,print,spawn,grimblast copysave window

# media keys
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05+
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05-
bind=none,XF86MonBrightnessUp,spawn,brightnessctl -d intel_backlight s 5%+
bind=none,XF86MonBrightnessDown,spawn,brightnessctl -d intel_backlight s 5%-

# Mouse Button Bindings
mousebind=super,btn_left,moveresize,curmove
mousebind=super,btn_right,moveresize,curresize

# Axis Bindings
axisbind=super,up,viewtoleft_have_client
axisbind=super,down,viewtoright_have_client
