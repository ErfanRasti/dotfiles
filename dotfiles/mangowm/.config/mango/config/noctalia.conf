# Noctalia Shell keybindings
# Converted from niri config/noctalia.kdl

# Overview / hot corners
# enable_hotarea=1
# hotarea_size=12
# hotarea_corner=0
# ov_tab_mode=1
# overviewgappi=5
# overviewgappo=30


# launcher
bind=alt,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=super,comma,spawn,qs -c noctalia-shell ipc call settings toggle

# Audio controls
bind=none,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bind=none,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=none,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind=none,XF86AudioMicMute,spawn,qs -c noctalia-shell ipc call volume muteInput

# Brightness controls
bind=none,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind=none,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

# Notifications
bind=super,n,spawn,qs -c noctalia-shell ipc call notifications toggleHistory
bind=super+alt,n,spawn,qs -c noctalia-shell ipc call notifications toggleDND

# System
bind=super+alt,w,spawn,qs -c noctalia-shell ipc call wallpaper toggle
bind=super,escape,spawn,qs -c noctalia-shell ipc call lockScreen lock
bind=super,s,spawn,qs -c noctalia-shell ipc call controlCenter toggle
bind=super,v,spawn,qs -c noctalia-shell ipc call launcher clipboard
bind=super,b,spawn,qs -c noctalia-shell ipc call dock toggle
bind=super,period,spawn,qs -c noctalia-shell ipc call launcher emoji
bind=super+alt,period,spawn,qs -c noctalia-shell ipc call plugin:kaomoji toggle
bind=super,slash,spawn,qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle
bind=super+ctrl+alt+shift,k,spawn,qs -c noctalia-shell ipc call plugin:show-keys toggle
bind=super+shift,n,spawn,qs -c noctalia-shell ipc call plugin:sticky-notes toggle
bind=super+ctrl+shift,s,spawn,qs -c noctalia-shell ipc call plugin:screen-toolkit toggle
bind=super+ctrl+shift,c,spawn,~/.config/noctalia/plugins/keep-awake-plus/scripts/system-awake
bind=alt,f4,spawn,qs -c noctalia-shell ipc call sessionMenu toggle
