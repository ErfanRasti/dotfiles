# Press F1 to search in keybindings

# Drag and drop
# https://github.com/sxyazi/yazi/discussions/2153
[[mgr.prepend_keymap]]
on = "<C-y>"
run = 'shell -- ripdrag --icon-size 64 --and-exit --all "$@"'
desc = "Drag and drop out of the yazi"

[[mgr.prepend_keymap]]
on = "<C-v>"
run = 'shell -- ripdrag --target --icon-size 64 --and-exit --all --no-click "$@" | while read filepath; do cp -nR "$filepath" .; done'
desc = "Drag and drop isnide the yazi"

# toggle-pane
[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

# smart-enter
[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# Open selected files
[[mgr.prepend_keymap]]
on = "<C-l>"
run = "open"
desc = "Open selected files"


# Copy yanked files to the system clipboard
[[mgr.prepend_keymap]]
on = "y"
run = ["yank", 'plugin clipboard -- --action=copy']


# Paste files from the system clipboard into the current directory
[[mgr.prepend_keymap]]
on = "<C-p>"
run = ['plugin clipboard -- --action=paste']

